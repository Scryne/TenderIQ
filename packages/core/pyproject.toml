[project]
name = "tenderiq-core"
version = "0.0.0"
description = "TenderIQ paylaşılan çekirdek: config, loglama, veri katmanı, servisler, AI hattı."
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.9.0",
    "pydantic-settings>=2.5.0",
    "sqlalchemy[asyncio]>=2.0.35",
    "alembic>=1.13.0",
    "psycopg[binary]>=3.2.0",
    "redis>=5.2.0",
    "structlog>=24.4.0",
    "pgvector>=0.3.0",
    "pyjwt>=2.9.0",
    "pwdlib[argon2]>=0.2.1",
    "boto3>=1.35.0",
    # Hata izleme (C.6): DSN yoksa no-op; FastAPI/Celery entegrasyonları otomatik.
    "sentry-sdk>=2.19.0",
]

# Ağır/opsiyonel extras (ADR-0004 paketleme kararı): API bunlarsız çalışır;
# worker imajı ve parsing geliştirmesi kurar (kök `parsing`/`ocr` grupları üzerinden).
[project.optional-dependencies]
parsing = [
    "docling>=2.0.0",
    "pypdf>=5.0.0",
]
# OCR motoru: EasyOCR (ADR-0011 — TR kalitesi gerçek şartnamelerle doğrulandı).
ocr = [
    "easyocr>=1.7.0",
]
# Embedding: BGE-M3, sentence-transformers üzerinden (ADR-0008). Torch yığınını
# docling ile paylaşır; yalnız worker imajına kurulur (kök `embedding` grubu).
embedding = [
    "sentence-transformers>=3.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tenderiq_core"]
