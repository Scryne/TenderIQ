[project]
name = "tenderiq-core"
version = "0.0.0"
description = "TenderIQ paylaşılan çekirdek: config, loglama, veri katmanı, servisler, AI hattı."
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.9.0",
    "pydantic-settings>=2.5.0",
    "sqlalchemy[asyncio]>=2.0.35",
    "alembic>=1.13.0",
    "psycopg[binary]>=3.2.0",
    "redis>=5.2.0",
    "structlog>=24.4.0",
    "pgvector>=0.3.0",
    "pyjwt>=2.9.0",
    "pwdlib[argon2]>=0.2.1",
    "boto3>=1.35.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tenderiq_core"]
