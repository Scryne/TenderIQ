name: tenderiq

# api/worker: RLS'ye TABİ non-superuser rol (tenderiq_app).
# migrate: ayrıcalıklı owner/superuser rol (tenderiq). Bkz. ADR-0003.
x-app-env: &app-env
  DATABASE_URL: postgresql+psycopg://tenderiq_app:tenderiq_app@postgres:5432/tenderiq
  REDIS_URL: redis://redis:6379/0

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: tenderiq
      POSTGRES_PASSWORD: tenderiq
      POSTGRES_DB: tenderiq
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tenderiq -d tenderiq"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Migration'ları çalıştırıp çıkan tek seferlik servis (ayrıcalıklı rol).
  migrate:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    command: ["alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql+psycopg://tenderiq:tenderiq@postgres:5432/tenderiq
      # .env'deki DATABASE_ADMIN_URL localhost'a bakar; container içinde geçersiz →
      # burada postgres servis adına override et (environment, env_file'ı ezer).
      DATABASE_ADMIN_URL: postgresql+psycopg://tenderiq:tenderiq@postgres:5432/tenderiq
      REDIS_URL: redis://redis:6379/0
    env_file:
      - path: ../../.env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    environment:
      <<: *app-env
      # Web istekleri Next proxy'sinden (web servisi) gelir; X-Forwarded-For'un
      # sondan 1 girdisi güvenilirdir (oran sınırlama gerçek istemci IP'sini görür).
      TRUSTED_PROXY_COUNT: "1"
    env_file:
      - path: ../../.env
        required: false
    ports:
      - "8000:8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz', timeout=3)"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/worker.Dockerfile
    environment:
      <<: *app-env
    env_file:
      - path: ../../.env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # NEXT_PUBLIC_API_URL build anında gömülür (tarayıcı host'tan erişir → localhost).
  # API_URL çalışma anında sunucu tarafı proxy (/api/v1/[...path]) içindir:
  # web container'ı backend'e compose ağı üzerinden (api:8000) ulaşır.
  web:
    build:
      context: ../..
      dockerfile: infra/docker/web.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    environment:
      API_URL: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
